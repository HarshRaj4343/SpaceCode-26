<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050a10;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="earth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a5fa0" />
      <stop offset="60%" style="stop-color:#0d3a6a" />
      <stop offset="100%" style="stop-color:#071d36" />
    </radialGradient>
    <radialGradient id="hazAst" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#ff6030" />
      <stop offset="100%" style="stop-color:#8a2a00" />
    </radialGradient>
    <radialGradient id="safeAst" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#60a0ff" />
      <stop offset="100%" style="stop-color:#2040a0" />
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" fill="url(#bg2)" rx="14"/>

  <!-- Stars scattered -->
  <circle cx="30" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="80" cy="60" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="150" cy="20" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="250" cy="40" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="400" cy="15" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="50" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="620" cy="25" r="1" fill="white" opacity="0.4"/>
  <circle cx="670" cy="70" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="680" cy="200" r="1" fill="white" opacity="0.3"/>
  <circle cx="20" cy="200" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="60" cy="250" r="1" fill="white" opacity="0.3"/>
  <circle cx="640" cy="260" r="0.8" fill="white" opacity="0.4"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#a0c8ff" font-size="12" font-weight="bold" letter-spacing="2">NASA/JPL HAZARD CLASSIFICATION CRITERIA</text>

  <!-- Earth -->
  <circle cx="350" cy="160" r="55" fill="url(#earth)" filter="url(#softglow)"/>
  <!-- Earth glow ring -->
  <circle cx="350" cy="160" r="58" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
  <circle cx="350" cy="160" r="63" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.3"/>
  <text x="350" y="155" text-anchor="middle" fill="#a0d0ff" font-size="11" font-weight="bold">🌍</text>
  <text x="350" y="170" text-anchor="middle" fill="#80b0e0" font-size="8">EARTH</text>

  <!-- MOID orbit ring (dashed circle showing 0.05 AU boundary) -->
  <circle cx="350" cy="160" r="120" fill="none" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="475" y="148" fill="#ffcc00" font-size="9" font-weight="bold">MOID = 0.05 AU</text>
  <text x="475" y="160" fill="#cc9900" font-size="8">danger boundary</text>

  <!-- HAZARDOUS asteroid (inside boundary) -->
  <circle cx="210" cy="105" r="14" fill="url(#hazAst)" filter="url(#glow2)"/>
  <text x="210" y="109" text-anchor="middle" fill="white" font-size="10">☄️</text>
  <!-- Trajectory line to Earth (hazardous) -->
  <line x1="220" y1="115" x2="305" y2="148" stroke="#ff4040" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- Hazardous label box -->
  <rect x="60" y="75" width="130" height="55" rx="8" fill="#2a0808" stroke="#ff4040" stroke-width="1.5" opacity="0.95"/>
  <text x="125" y="93" text-anchor="middle" fill="#ff4040" font-size="10" font-weight="bold">⚠️ HAZARDOUS</text>
  <text x="125" y="107" text-anchor="middle" fill="#ff9090" font-size="9">MOID ≤ 0.05 AU</text>
  <text x="125" y="120" text-anchor="middle" fill="#ff9090" font-size="9">Magnitude ≤ 22.0</text>

  <!-- SAFE asteroid (outside boundary) -->
  <circle cx="560" cy="95" r="10" fill="url(#safeAst)" filter="url(#glow2)"/>
  <text x="560" y="99" text-anchor="middle" fill="white" font-size="8">🪨</text>
  <!-- Trajectory line (safe, curving away) -->
  <path d="M 552 104 Q 480 145 420 135" fill="none" stroke="#40a0ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Safe label box -->
  <rect x="510" y="70" width="130" height="55" rx="8" fill="#080820" stroke="#4a9eff" stroke-width="1.5" opacity="0.95"/>
  <text x="575" y="88" text-anchor="middle" fill="#4a9eff" font-size="10" font-weight="bold">✅ SAFE</text>
  <text x="575" y="102" text-anchor="middle" fill="#90c0ff" font-size="9">MOID &gt; 0.05 AU</text>
  <text x="575" y="115" text-anchor="middle" fill="#90c0ff" font-size="9">Magnitude &gt; 22.0</text>

  <!-- Bottom metrics row -->
  <rect x="40" y="228" width="180" height="38" rx="8" fill="#1a1040" stroke="#b06aff" stroke-width="1"/>
  <text x="130" y="244" text-anchor="middle" fill="#b06aff" font-size="9" font-weight="bold">SIZE THRESHOLD</text>
  <text x="130" y="258" text-anchor="middle" fill="#d0a0ff" font-size="9">~140m diameter → regional damage</text>

  <rect x="260" y="228" width="180" height="38" rx="8" fill="#001a10" stroke="#00ff88" stroke-width="1"/>
  <text x="350" y="244" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">MODEL METRIC</text>
  <text x="350" y="258" text-anchor="middle" fill="#80ffb0" font-size="9">Recall = 1.00 → 0 Missed Threats</text>

  <rect x="480" y="228" width="180" height="38" rx="8" fill="#1a0010" stroke="#ff4a6a" stroke-width="1"/>
  <text x="570" y="244" text-anchor="middle" fill="#ff4a6a" font-size="9" font-weight="bold">AUC-ROC SCORE</text>
  <text x="570" y="258" text-anchor="middle" fill="#ffa0b0" font-size="9">0.999817 → Near-Perfect Separation</text>
</svg>
